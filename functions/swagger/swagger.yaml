  # ──────────────── Holiday ────────────────
  /v1/holiday/:
    get:
      tags: [Holiday]
      summary: Get public holidays
      description: Fetches public holidays from Google Calendar API. No authentication required.
      security: []
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
          description: Year (e.g. 2024)
        - name: locale
          in: query
          required: true
          schema:
            type: string
          description: Locale code (e.g. ko)
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Country code (e.g. KR)
      responses:
        '200':
          description: Holiday data
          content:
            application/json:
              schema:
                type: object

  # ──────────────── Data Sync ────────────────
  /v1/sync/check:
    get:
      tags: [DataSync]
      summary: Check if sync is needed
      parameters:
        - name: dataType
          in: query
          required: true
          schema:
            type: string
            enum: [EventTag, Todo, Schedule]
        - name: timestamp
          in: query
          schema:
            type: number
          description: Last known sync timestamp (milliseconds)
      responses:
        '200':
          description: Sync check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncCheckResponse'

  /v1/sync/start:
    get:
      tags: [DataSync]
      summary: Start sync and get first page
      parameters:
        - name: dataType
          in: query
          required: true
          schema:
            type: string
            enum: [EventTag, Todo, Schedule]
        - name: timestamp
          in: query
          schema:
            type: number
          description: Last known sync timestamp
        - name: size
          in: query
          required: true
          schema:
            type: integer
          description: Page size
      responses:
        '200':
          description: First page of sync data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResponse'

  /v1/sync/continue:
    get:
      tags: [DataSync]
      summary: Continue sync with next page
      parameters:
        - name: dataType
          in: query
          required: true
          schema:
            type: string
            enum: [EventTag, Todo, Schedule]
        - name: cursor
          in: query
          required: true
          schema:
            type: string
          description: Pagination cursor from previous response
        - name: size
          in: query
          required: true
          schema:
            type: integer
          description: Page size
      responses:
        '200':
          description: Next page of sync data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID Token
      description: Firebase Authentication ID token

  parameters:
    TodoId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Todo ID
    DoneTodoId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Done todo ID
    ScheduleId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Schedule ID
    TagId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Event tag ID
    EventId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Event ID

  schemas:
    # ── Common ──
    StatusOk:
      type: object
      properties:
        status:
          type: string
          example: ok

    Error:
      type: object
      properties:
        status:
          type: integer
        code:
          type: string
        message:
          type: string

    # ── Value Objects ──
    EventTime:
      oneOf:
        - $ref: '#/components/schemas/AtTime'
        - $ref: '#/components/schemas/PeriodTime'
        - $ref: '#/components/schemas/AllDayTime'
      discriminator:
        propertyName: time_type
        mapping:
          at: '#/components/schemas/AtTime'
          period: '#/components/schemas/PeriodTime'
          allday: '#/components/schemas/AllDayTime'

    AtTime:
      type: object
      required: [time_type, timestamp]
      properties:
        time_type:
          type: string
          enum: [at]
        timestamp:
          type: number
          description: Unix timestamp

    PeriodTime:
      type: object
      required: [time_type, period_start, period_end]
      properties:
        time_type:
          type: string
          enum: [period]
        period_start:
          type: number
          description: Period start timestamp
        period_end:
          type: number
          description: Period end timestamp

    AllDayTime:
      type: object
      required: [time_type, period_start, period_end, seconds_from_gmt]
      properties:
        time_type:
          type: string
          enum: [allday]
        period_start:
          type: number
        period_end:
          type: number
        seconds_from_gmt:
          type: number
          description: Timezone offset in seconds from GMT

    Repeating:
      type: object
      required: [start, option]
      properties:
        start:
          type: number
          description: Repeating start timestamp
        option:
          type: string
          description: Recurrence pattern
        end:
          type: number
          nullable: true
          description: Repeating end timestamp
        end_count:
          type: number
          nullable: true
          description: Number of occurrences

    # ── Domain Models ──
    Todo:
      type: object
      required: [uuid, userId, name, is_current, create_timestamp]
      properties:
        uuid:
          type: string
        userId:
          type: string
        name:
          type: string
        is_current:
          type: boolean
        create_timestamp:
          type: number
        event_tag_id:
          type: string
          nullable: true
        event_time:
          $ref: '#/components/schemas/EventTime'
        repeating:
          $ref: '#/components/schemas/Repeating'
        notification_options:
          type: array
          items:
            type: object
          nullable: true
        repeating_turn:
          type: string
          nullable: true

    TodoInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        event_tag_id:
          type: string
        event_time:
          $ref: '#/components/schemas/EventTime'
        repeating:
          $ref: '#/components/schemas/Repeating'
        notification_options:
          type: array
          items:
            type: object

    TodoPatchInput:
      type: object
      properties:
        name:
          type: string
        event_tag_id:
          type: string
        event_time:
          $ref: '#/components/schemas/EventTime'
        repeating:
          $ref: '#/components/schemas/Repeating'
        notification_options:
          type: array
          items:
            type: object

    Schedule:
      type: object
      required: [uuid, userId, name]
      properties:
        uuid:
          type: string
        userId:
          type: string
        name:
          type: string
        event_tag_id:
          type: string
          nullable: true
        event_time:
          $ref: '#/components/schemas/EventTime'
        repeating:
          $ref: '#/components/schemas/Repeating'
        notification_options:
          type: array
          items:
            type: object
          nullable: true
        show_turns:
          type: object
          nullable: true
        exclude_repeatings:
          type: array
          items:
            type: number
          nullable: true

    ScheduleInput:
      type: object
      required: [name, event_time]
      properties:
        name:
          type: string
        event_time:
          $ref: '#/components/schemas/EventTime'
        event_tag_id:
          type: string
        repeating:
          $ref: '#/components/schemas/Repeating'
        notification_options:
          type: array
          items:
            type: object
        show_turns:
          type: object

    SchedulePatchInput:
      type: object
      properties:
        name:
          type: string
        event_time:
          $ref: '#/components/schemas/EventTime'
        event_tag_id:
          type: string
        repeating:
          $ref: '#/components/schemas/Repeating'
        notification_options:
          type: array
          items:
            type: object
        show_turns:
          type: object

    DoneTodo:
      type: object
      required: [uuid, userId, name]
      properties:
        uuid:
          type: string
        userId:
          type: string
        name:
          type: string
        origin_event_id:
          type: string
          nullable: true
        done_at:
          type: number
          nullable: true
        event_time:
          $ref: '#/components/schemas/EventTime'
        event_tag_id:
          type: string
          nullable: true
        notification_options:
          type: array
          items:
            type: object
          nullable: true

    DoneTodoPatchInput:
      type: object
      properties:
        name:
          type: string
        event_time:
          $ref: '#/components/schemas/EventTime'
        event_tag_id:
          type: string

    EventTag:
      type: object
      required: [uuid, userId, name]
      properties:
        uuid:
          type: string
        userId:
          type: string
        name:
          type: string
        color_hex:
          type: string
          nullable: true

    ForemostEvent:
      type: object
      required: [event_id, is_todo]
      properties:
        event_id:
          type: string
        is_todo:
          type: boolean
        event:
          oneOf:
            - $ref: '#/components/schemas/Todo'
            - $ref: '#/components/schemas/Schedule'

    EventDetail:
      type: object
      properties:
        place:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        memo:
          type: string
          nullable: true

    EventDetailInput:
      type: object
      properties:
        place:
          type: string
        url:
          type: string
        memo:
          type: string

    Account:
      type: object
      required: [uid]
      properties:
        uid:
          type: string
        email:
          type: string
          nullable: true
        method:
          type: string
          nullable: true
        first_signed_in:
          type: string
          nullable: true
        last_sign_in:
          type: string
          nullable: true

    # ── Settings ──
    DefaultTagColors:
      type: object
      properties:
        holiday:
          type: string
          description: Default color hex for holiday tags
        default:
          type: string
          description: Default color hex for regular tags

    DefaultTagColorsInput:
      type: object
      properties:
        holiday:
          type: string
        default:
          type: string

    # ── Sync ──
    SyncCheckResponse:
      type: object
      properties:
        result:
          type: string
          enum: [noNeedToSync, needToSync, migrationNeeds]
        start:
          type: number
          nullable: true

    SyncResponse:
      type: object
      properties:
        created:
          type: array
          items:
            type: object
          nullable: true
        updated:
          type: array
          items:
            type: object
          nullable: true
        deleted:
          type: array
          items:
            type: object
          nullable: true
        newSyncTime:
          type: number
          nullable: true
        nextPageCursor:
          type: string
          nullable: true

  responses:
    BadRequest:
      description: Invalid parameter
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 400
            code: InvalidParameter
            message: "required parameter is missing"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            status: 404
            code: NotFound
            message: "resource not found"
    Unauthorized:
      description: Invalid or missing auth token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
