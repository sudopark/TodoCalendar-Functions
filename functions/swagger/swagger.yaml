openapi: 3.0.0
info:
  title: TodoCalendar API
  description: Firebase Cloud Functions backend for TodoCalendar app. Provides todo/schedule management, event tagging, data sync, and more.
  version: 1.0.0

servers:
  - url: http://localhost:5001/{projectId}/us-central1/api
    description: Local Emulator
    variables:
      projectId:
        default: todocalendar-1707723626269
  - url: https://us-central1-{projectId}.cloudfunctions.net/api
    description: Firebase Production
    variables:
      projectId:
        default: todocalendar-1707723626269

tags:
  - name: Accounts
    description: Account registration and deletion (no auth required)
  - name: User
    description: User device and push notification management
  - name: Todos
    description: Todo CRUD and completion operations
  - name: DoneTodos
    description: Completed todo management
  - name: Schedules
    description: Schedule event CRUD and repeating operations
  - name: EventTags
    description: Event tag management
  - name: EventDetails
    description: Event detail (place, url, memo) management
  - name: ForemostEvent
    description: Foremost (pinned) event management
  - name: Migration
    description: Bulk data migration endpoints
  - name: AppSettings
    description: User app settings
  - name: Holiday
    description: Public holiday lookup (no auth required)
  - name: DataSync
    description: Incremental data synchronization
  - name: OpenAPI Todos
    description: "openAPI todos for external callers (MCP, aiFrontAPI). Auth: PAT + signed user JWT + scope."
  - name: OpenAPI Schedules
    description: "openAPI schedules for external callers. Auth: PAT + signed user JWT + scope."
  - name: OpenAPI EventTags
    description: "openAPI event tags for external callers. Auth: PAT + signed user JWT + scope."
  - name: OpenAPI DoneTodos
    description: "openAPI done todos for external callers. Auth: PAT + signed user JWT + scope."
  - name: OpenAPI EventDetails
    description: "openAPI event details for external callers. Auth: PAT + signed user JWT + scope."
  - name: aiFrontAPI
    description: "AI 자연어 명령 진입점 (/v1/ai/*). 비동기 Job 발행 → Firestore trigger 에서 Agent Loop 실행 → FCM push. 자세한 spec: docs/spec/aiFront.md"
  - name: OAuth 2.1 AS
    description: "OAuth 2.1 Authorization Server (/v1/oauth/*). Dynamic client registration (RFC 7591), authorization code + PKCE, token 발급/revocation. Firebase Auth 미적용. 자세한 spec: docs/spec/oauth.md"
  - name: OAuth Metadata
    description: "OAuth metadata (/.well-known/*). RFC 8414 authorization-server + RFC 7517 JWKS. 정적 public 데이터, Cache-Control: public, max-age=600."

security:
  - BearerAuth: []

paths:
  # ──────────────── Accounts ────────────────
  /v1/accounts/info:
    put:
      tags: [Accounts]
      summary: Register or update account info
      description: Creates or updates user account information using the Firebase auth token.
      security: []
      responses:
        '201':
          description: Account info saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'

  /v1/accounts/account:
    delete:
      tags: [Accounts]
      summary: Delete account
      description: Permanently deletes the user account and associated data.
      security: []
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                type: object

  # ──────────────── User ────────────────
  /v1/user/notification:
    put:
      tags: [User]
      summary: Register or update push notification token
      description: Registers FCM token for push notifications on a specific device.
      parameters:
        - name: device_id
          in: header
          required: true
          schema:
            type: string
          description: Unique device identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fcm_token]
              properties:
                fcm_token:
                  type: string
                  description: Firebase Cloud Messaging token
                device_model:
                  type: string
                  description: Device model name
      responses:
        '201':
          description: Token registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'
    delete:
      tags: [User]
      summary: Remove push notification token
      description: Removes the FCM token for a specific device.
      parameters:
        - name: device_id
          in: header
          required: true
          schema:
            type: string
          description: Unique device identifier
      responses:
        '200':
          description: Token removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'

  # ──────────────── Todos ────────────────
  /v1/todos/todo/{id}:
    get:
      tags: [Todos]
      summary: Get a specific todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Todo found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Todos]
      summary: Replace a todo (full update)
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoInput'
      responses:
        '201':
          description: Todo updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
    patch:
      tags: [Todos]
      summary: Partially update a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoPatchInput'
      responses:
        '201':
          description: Todo updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
    delete:
      tags: [Todos]
      summary: Delete a todo
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Todo deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'

  /v1/todos/:
    get:
      tags: [Todos]
      summary: Get todos by time range or current todos
      description: If both lower and upper are provided, returns todos in that time range. Otherwise returns current todos.
      parameters:
        - name: lower
          in: query
          schema:
            type: number
          description: Time range lower bound (timestamp)
        - name: upper
          in: query
          schema:
            type: number
          description: Time range upper bound (timestamp)
      responses:
        '200':
          description: List of todos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'

  /v1/todos/uncompleted:
    get:
      tags: [Todos]
      summary: Get uncompleted todos
      parameters:
        - name: refTime
          in: query
          required: true
          schema:
            type: number
          description: Reference timestamp for filtering
      responses:
        '200':
          description: List of uncompleted todos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'

  /v1/todos/todo:
    post:
      tags: [Todos]
      summary: Create a new todo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoInput'
      responses:
        '201':
          description: Todo created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'

  /v1/todos/todo/{id}/complete:
    post:
      tags: [Todos]
      summary: Mark a todo as complete
      description: Completes a todo and optionally sets up the next repeating occurrence.
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [origin]
              properties:
                origin:
                  $ref: '#/components/schemas/TodoInput'
                next_event_time:
                  $ref: '#/components/schemas/EventTime'
                next_repeating_turn:
                  type: string
      responses:
        '201':
          description: Todo completed
          content:
            application/json:
              schema:
                type: object

  /v1/todos/todo/{id}/replace:
    post:
      tags: [Todos]
      summary: Replace a repeating todo
      description: Replaces a repeating todo with a new one, optionally updating the original's next occurrence.
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new]
              properties:
                new:
                  $ref: '#/components/schemas/TodoInput'
                origin_next_event_time:
                  $ref: '#/components/schemas/EventTime'
                next_repeating_turn:
                  type: string
      responses:
        '201':
          description: Todo replaced
          content:
            application/json:
              schema:
                type: object

  # v2 Todos (same behavior)
  /v2/todos/todo/{id}:
    get:
      tags: [Todos]
      summary: "[v2] Get a specific todo"
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Todo found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
    put:
      tags: [Todos]
      summary: "[v2] Replace a todo"
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoInput'
      responses:
        '201':
          description: Todo updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
    patch:
      tags: [Todos]
      summary: "[v2] Partially update a todo"
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoPatchInput'
      responses:
        '201':
          description: Todo updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'
    delete:
      tags: [Todos]
      summary: "[v2] Delete a todo"
      parameters:
        - $ref: '#/components/parameters/TodoId'
      responses:
        '200':
          description: Todo deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'

  /v2/todos/:
    get:
      tags: [Todos]
      summary: "[v2] Get todos by time range or current todos"
      parameters:
        - name: lower
          in: query
          schema:
            type: number
        - name: upper
          in: query
          schema:
            type: number
      responses:
        '200':
          description: List of todos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'

  /v2/todos/uncompleted:
    get:
      tags: [Todos]
      summary: "[v2] Get uncompleted todos"
      parameters:
        - name: refTime
          in: query
          required: true
          schema:
            type: number
      responses:
        '200':
          description: List of uncompleted todos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'

  /v2/todos/todo:
    post:
      tags: [Todos]
      summary: "[v2] Create a new todo"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TodoInput'
      responses:
        '201':
          description: Todo created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'

  /v2/todos/todo/{id}/complete:
    post:
      tags: [Todos]
      summary: "[v2] Mark a todo as complete"
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [origin]
              properties:
                origin:
                  $ref: '#/components/schemas/TodoInput'
                next_event_time:
                  $ref: '#/components/schemas/EventTime'
                next_repeating_turn:
                  type: string
      responses:
        '201':
          description: Todo completed
          content:
            application/json:
              schema:
                type: object

  /v2/todos/todo/{id}/replace:
    post:
      tags: [Todos]
      summary: "[v2] Replace a repeating todo"
      parameters:
        - $ref: '#/components/parameters/TodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new]
              properties:
                new:
                  $ref: '#/components/schemas/TodoInput'
                origin_next_event_time:
                  $ref: '#/components/schemas/EventTime'
                next_repeating_turn:
                  type: string
      responses:
        '201':
          description: Todo replaced
          content:
            application/json:
              schema:
                type: object

  # ──────────────── Done Todos ────────────────
  /v1/todos/dones/:
    get:
      tags: [DoneTodos]
      summary: Get completed todos (paginated)
      parameters:
        - name: size
          in: query
          required: true
          schema:
            type: integer
          description: Page size
        - name: cursor
          in: query
          schema:
            type: number
          description: Pagination cursor (done_at timestamp)
      responses:
        '200':
          description: Paginated done todos
          content:
            application/json:
              schema:
                type: object
                properties:
                  dones:
                    type: array
                    items:
                      $ref: '#/components/schemas/DoneTodo'
                  next_cursor:
                    type: number
                    nullable: true
    delete:
      tags: [DoneTodos]
      summary: Delete completed todos in bulk
      parameters:
        - name: past_than
          in: query
          schema:
            type: number
          description: Delete done todos older than this timestamp
      responses:
        '200':
          description: Done todos deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'

  /v1/todos/dones/{id}:
    get:
      tags: [DoneTodos]
      summary: Get a specific completed todo
      parameters:
        - $ref: '#/components/parameters/DoneTodoId'
      responses:
        '200':
          description: Done todo found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoneTodo'
    put:
      tags: [DoneTodos]
      summary: Update a completed todo
      parameters:
        - $ref: '#/components/parameters/DoneTodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoneTodoPatchInput'
      responses:
        '200':
          description: Done todo updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoneTodo'
    delete:
      tags: [DoneTodos]
      summary: Delete a specific completed todo
      parameters:
        - $ref: '#/components/parameters/DoneTodoId'
      responses:
        '200':
          description: Done todo deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'

  /v1/todos/dones/{id}/revert:
    post:
      tags: [DoneTodos]
      summary: Revert a completed todo back to active
      parameters:
        - $ref: '#/components/parameters/DoneTodoId'
      responses:
        '201':
          description: Todo reverted
          content:
            application/json:
              schema:
                type: object

  /v1/todos/dones/cancel:
    post:
      tags: [DoneTodos]
      summary: Cancel a todo completion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [origin]
              properties:
                origin:
                  $ref: '#/components/schemas/TodoInput'
                done_id:
                  type: string
      responses:
        '201':
          description: Completion canceled
          content:
            application/json:
              schema:
                type: object

  # v2 Done Todos
  /v2/todos/dones/:
    get:
      tags: [DoneTodos]
      summary: "[v2] Get completed todos (paginated)"
      parameters:
        - name: size
          in: query
          required: true
          schema:
            type: integer
        - name: cursor
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Paginated done todos
          content:
            application/json:
              schema:
                type: object
                properties:
                  dones:
                    type: array
                    items:
                      $ref: '#/components/schemas/DoneTodo'
                  next_cursor:
                    type: number
                    nullable: true
    delete:
      tags: [DoneTodos]
      summary: "[v2] Delete completed todos in bulk"
      parameters:
        - name: past_than
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Done todos deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'

  /v2/todos/dones/{id}:
    get:
      tags: [DoneTodos]
      summary: "[v2] Get a specific completed todo"
      parameters:
        - $ref: '#/components/parameters/DoneTodoId'
      responses:
        '200':
          description: Done todo found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoneTodo'
    put:
      tags: [DoneTodos]
      summary: "[v2] Update a completed todo"
      parameters:
        - $ref: '#/components/parameters/DoneTodoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoneTodoPatchInput'
      responses:
        '200':
          description: Done todo updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoneTodo'
    delete:
      tags: [DoneTodos]
      summary: "[v2] Delete a specific completed todo"
      parameters:
        - $ref: '#/components/parameters/DoneTodoId'
      responses:
        '200':
          description: Done todo deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'

  /v2/todos/dones/{id}/revert:
    post:
      tags: [DoneTodos]
      summary: "[v2] Revert a completed todo back to active"
      description: V2 uses a different revert logic than v1.
      parameters:
        - $ref: '#/components/parameters/DoneTodoId'
      responses:
        '201':
          description: Todo reverted
          content:
            application/json:
              schema:
                type: object

  /v2/todos/dones/cancel:
    post:
      tags: [DoneTodos]
      summary: "[v2] Cancel a todo completion"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [origin]
              properties:
                origin:
                  $ref: '#/components/schemas/TodoInput'
                done_id:
                  type: string
      responses:
        '201':
          description: Completion canceled
          content:
            application/json:
              schema:
                type: object

  # ──────────────── Schedules ────────────────
  /v1/schedules/:
    get:
      tags: [Schedules]
      summary: Get schedules by time range
      parameters:
        - name: lower
          in: query
          required: true
          schema:
            type: number
          description: Time range lower bound (timestamp)
        - name: upper
          in: query
          required: true
          schema:
            type: number
          description: Time range upper bound (timestamp)
      responses:
        '200':
          description: List of schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Schedule'

  /v1/schedules/schedule/{id}:
    get:
      tags: [Schedules]
      summary: Get a specific schedule
      parameters:
        - $ref: '#/components/parameters/ScheduleId'
      responses:
        '200':
          description: Schedule found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
    put:
      tags: [Schedules]
      summary: Replace a schedule (full update)
      parameters:
        - $ref: '#/components/parameters/ScheduleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleInput'
      responses:
        '201':
          description: Schedule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
    patch:
      tags: [Schedules]
      summary: Partially update a schedule
      parameters:
        - $ref: '#/components/parameters/ScheduleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchedulePatchInput'
      responses:
        '201':
          description: Schedule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
    delete:
      tags: [Schedules]
      summary: Delete a schedule
      parameters:
        - $ref: '#/components/parameters/ScheduleId'
      responses:
        '201':
          description: Schedule deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusOk'

  /v1/schedules/schedule:
    post:
      tags: [Schedules]
      summary: Create a new schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleInput'
      responses:
        '201':
          description: Schedule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'

  /v1/schedules/schedule/{id}/exclude:
    post:
      tags: [Schedules]
      summary: Create new schedule excluding from repeating
      description: Creates a new schedule event and excludes specified times from the original repeating schedule.
      parameters:
        - $ref: '#/components/parameters/ScheduleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new, exclude_repeatings]
              properties:
                new:
                  $ref: '#/components/schemas/ScheduleInput'
                exclude_repeatings:
                  type: array
                  items:
                    type: number
      responses:
        '201':
          description: New schedule created with exclusion
          content:
            application/json:
              schema:
                type: object
    patch:
      tags: [Schedules]
      summary: Exclude repeating times from schedule
      parameters:
        - $ref: '#/components/parameters/ScheduleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [exclude_repeatings]
              properties:
                exclude_repeatings:
                  type: array
                  items:
                    type: number
      responses:
        '200':
          description: Repeating times excluded
          content:
            application/json:
              schema:
                type: object

  /v1/schedules/schedule/{id}/branch_repeating:
    post:
      tags: [Schedules]
      summary: Branch a repeating schedule
      description: Ends the current repeating schedule at the specified time and creates a new schedule from that point.
      parameters:
        - $ref: '#/components/parameters/ScheduleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [end_time, new]
              properties:
                end_time:
                  type: number
                  description: End time for the original repeating schedule
                new:
                  $ref: '#/components/schemas/ScheduleInput'
      responses:
        '201':
          description: Schedule branched
          content:
            application/json:
              schema:
                type: object

  # v2 Schedules
  /v2/schedules/:
    get:
      tags: [Schedules]
      summary: "[v2] Get schedules by time range"
      parameters:
        - name: lower
          in: query
          required: true
          schema:
            type: number
        - name: upper
          in: query
          required: true
          schema:
            type: number
      responses:
        '200':
          description: List of schedules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Schedule'

  /v2/schedules/schedule/{id}:
    get:
      tags: [Schedules]
      summary: "[v2] Get a specific schedule"
      parameters:
        - $ref: '#/components/parameters/ScheduleId'
      responses:
        '200':
          description: Schedule found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
    put:
      tags: [Schedules]
